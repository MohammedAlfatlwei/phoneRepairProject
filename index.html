<!DOCTYPE html>
<html>

<head>
    <title>Mobile Repair Request</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>



    <form id="repairForm">

        <label>Name:</label><br>
        <input type="text" id="name" required><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="07XXXXXXXXX" pattern="07[0-9]{9}" maxlength="11"
            required>
        <small id="phoneError" style="color:red;"></small>
        <br><br>

        <label>Phone Model:</label><br>
        <input type="text" id="device" required><br><br>

        <label>Service Type:</label><br>
        <select id="service">
            <option>Screen Replacement</option>
            <option>Battery Replacement</option>
            <option>Diagnosis</option>
        </select><br><br>
        <label>Location:</label><br>
        <input type="text" id="location" required><br><br>

        <button type="submit">Send via WhatsApp</button>
    </form>

    <!-- Chat Button -->
    <div id="chatButton">💬</div>

    <!-- Chat Box -->
    <div id="chatBox">

        <div id="chatHeader">
            Chat Support
            <span id="closeChat">✖</span>
        </div>

        <div id="chatMessages"></div>

        <div id="chatInputArea">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </div>

    </div>



    <script src="https://js.puter.com/v2/"></script>
    <!-- Link JavaScript file -->
    <script src="script.js"></script>

</body>

</html>
